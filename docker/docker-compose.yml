version: '3.8'

services:
  fiboscalpbot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fiboscalp_bot
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      - ../logs:/app/logs
      - ../config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - bot_network

networks:
  bot_network:
    driver: bridge
